<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Claude Runs — Forge Admin</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; background: #0d0d0d; color: #e8e8e8; font-family: -apple-system, system-ui, sans-serif; overflow: hidden; }
    .layout { display: flex; height: 100vh; }

    .runs-list {
      width: 280px; border-right: 1px solid #2a2a2a; display: flex; flex-direction: column;
      background: #0d0d0d; flex-shrink: 0;
    }
    .runs-header {
      padding: 14px 16px; border-bottom: 1px solid #2a2a2a;
      display: flex; align-items: center; gap: 10px;
    }
    .runs-header h1 { font-size: 14px; font-weight: 700; flex: 1; }
    .runs-header a { color: #888; font-size: 12px; text-decoration: none; }
    .runs-header a:hover { color: #0066FF; }
    .runs-scroll { flex: 1; overflow-y: auto; }
    .run-item {
      padding: 10px 16px; cursor: pointer; border-bottom: 1px solid #1a1a1a;
      transition: background 150ms;
    }
    .run-item:hover { background: rgba(255,255,255,0.03); }
    .run-item.selected { background: rgba(0,102,255,0.06); border-left: 3px solid #0066FF; }
    .run-item .ri-id { font-family: ui-monospace, monospace; font-size: 11px; color: #888; }
    .run-item .ri-prompt { font-size: 12px; color: #ccc; margin: 4px 0 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .run-item .ri-meta { font-size: 10px; color: #555; display: flex; gap: 8px; }
    .run-item .badge { font-size: 9px; padding: 1px 6px; border-radius: 3px; font-weight: 600; text-transform: uppercase; }
    .badge.running { background: #1a3a1a; color: #4a9a4a; }
    .badge.complete { background: #1a2a3a; color: #4a8af0; }
    .badge.error { background: #3a1a1a; color: #f04a4a; }

    .detail { flex: 1; display: flex; flex-direction: column; min-width: 0; }
    .detail-header { padding: 12px 20px; border-bottom: 1px solid #2a2a2a; background: #111; flex-shrink: 0; }
    .detail-header h2 { font-size: 14px; margin: 0 0 4px; }
    .detail-header .dh-meta { font-size: 11px; color: #888; }

    .detail-split { flex: 1; display: grid; grid-template-columns: 1fr 1fr; min-height: 0; }
    .pane { display: flex; flex-direction: column; overflow: hidden; }
    .pane:first-child { border-right: 1px solid #2a2a2a; }
    .pane-label { padding: 8px 16px; font-size: 10px; color: #555; text-transform: uppercase; letter-spacing: 0.5px; border-bottom: 1px solid #1a1a1a; flex-shrink: 0; }
    .pane-content { flex: 1; overflow-y: auto; padding: 14px 16px; font-family: ui-monospace, monospace; font-size: 12px; line-height: 1.55; white-space: pre-wrap; color: #ccc; }

    .new-run { padding: 12px 16px; border-top: 1px solid #2a2a2a; }
    .new-run textarea { width: 100%; background: #0d0d0d; border: 1px solid #2a2a2a; color: #e0e0e0; padding: 8px; border-radius: 4px; font-family: ui-monospace, monospace; font-size: 12px; min-height: 60px; resize: vertical; box-sizing: border-box; }
    .new-run button { margin-top: 6px; background: #0066FF; color: white; border: none; padding: 7px 14px; border-radius: 5px; cursor: pointer; font-size: 12px; font-weight: 600; }

    .empty { padding: 40px; text-align: center; color: #555; font-size: 13px; }

    @media (max-width: 800px) { .detail-split { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <div class="layout">
    <div class="runs-list">
      <div class="runs-header">
        <h1>⚒ Claude Runs</h1>
        <a href="/">← Catalog</a>
        <a href="/admin.html">Admin</a>
      </div>
      <div class="runs-scroll" id="runs-list"></div>
      <div class="new-run">
        <textarea id="new-prompt" placeholder="Enter a prompt to run with Claude Code..."></textarea>
        <button id="run-btn" onclick="submitRun()">▶ Run</button>
      </div>
    </div>
    <div class="detail" id="detail">
      <div class="empty">← Select a run to view its log</div>
    </div>
  </div>

  <script>
    const ADMIN_KEY = localStorage.getItem('forge_admin_key') || '';
    if (!ADMIN_KEY) {
      const k = prompt('Admin key:');
      if (k) localStorage.setItem('forge_admin_key', k);
      location.reload();
    }

    let selectedRunId = null;

    async function loadRuns() {
      try {
        const r = await fetch('/api/claude-runs', { headers: { 'X-Admin-Key': ADMIN_KEY } });
        const d = await r.json();
        renderRuns(d.runs || []);
      } catch (e) {
        document.getElementById('runs-list').innerHTML = '<div class="empty">Agent unavailable</div>';
      }
    }

    function renderRuns(runs) {
      const el = document.getElementById('runs-list');
      el.innerHTML = runs.map(r => `
        <div class="run-item ${r.run_id === selectedRunId ? 'selected' : ''}" data-id="${r.run_id}">
          <div class="ri-id">${r.run_id} <span class="badge ${r.status}">${r.status}</span></div>
          <div class="ri-prompt">${esc(r.prompt_preview || '(no prompt)')}</div>
          <div class="ri-meta"><span>${r.started_at || ''}</span></div>
        </div>
      `).join('') || '<div class="empty">No runs yet</div>';
      el.querySelectorAll('.run-item').forEach(item => {
        item.onclick = () => { selectedRunId = item.dataset.id; loadLog(selectedRunId); loadRuns(); };
      });
    }

    async function loadLog(runId) {
      try {
        const r = await fetch(`/api/claude-runs/${runId}/log`, { headers: { 'X-Admin-Key': ADMIN_KEY } });
        const d = await r.json();
        const detail = document.getElementById('detail');

        // Split log into prompt + output
        const log = d.log || '';
        const parts = log.split('---\n');
        const header = parts[0] || '';
        const output = parts.slice(1).join('---\n') || '(no output yet)';

        detail.innerHTML = `
          <div class="detail-header">
            <h2>Run ${runId}</h2>
            <div class="dh-meta"><span class="badge ${d.status}">${d.status}</span> ${d.exit_code !== null ? `exit ${d.exit_code}` : ''}</div>
          </div>
          <div class="detail-split">
            <div class="pane">
              <div class="pane-label">Prompt</div>
              <div class="pane-content">${esc(header)}</div>
            </div>
            <div class="pane">
              <div class="pane-label">Output</div>
              <div class="pane-content" id="log-output">${esc(output)}</div>
            </div>
          </div>`;

        // Auto-scroll output
        const logEl = document.getElementById('log-output');
        if (logEl) logEl.scrollTop = logEl.scrollHeight;

        // If still running, poll every 3s
        if (d.status === 'running') {
          setTimeout(() => { if (selectedRunId === runId) loadLog(runId); }, 3000);
        }
      } catch (e) {
        document.getElementById('detail').innerHTML = '<div class="empty">Failed to load log</div>';
      }
    }

    async function submitRun() {
      const prompt = document.getElementById('new-prompt').value.trim();
      if (!prompt) return;
      document.getElementById('run-btn').disabled = true;
      document.getElementById('run-btn').textContent = '⏳';
      try {
        const r = await fetch('/api/claude-exec', {
          method: 'POST',
          headers: { 'X-Admin-Key': ADMIN_KEY, 'Content-Type': 'application/json' },
          body: JSON.stringify({ prompt, project_dir: '~/projects/forge' }),
        });
        const d = await r.json();
        if (d.run_id) {
          selectedRunId = d.run_id;
          document.getElementById('new-prompt').value = '';
          await loadRuns();
          loadLog(d.run_id);
        } else {
          alert(d.message || d.error || 'Failed');
        }
      } catch (e) {
        alert('Error: ' + e.message);
      }
      document.getElementById('run-btn').disabled = false;
      document.getElementById('run-btn').textContent = '▶ Run';
    }

    function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

    // Auto-refresh run list every 5s
    loadRuns();
    setInterval(loadRuns, 5000);
  </script>
</body>
</html>
