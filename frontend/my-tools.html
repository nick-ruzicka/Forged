<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Forge</title>
  <link rel="stylesheet" href="/css/styles.css">
  <style>
    html, body { height: 100%; margin: 0; overflow: hidden; background: #0d0d0d; color: #e8e8e8; font-family: -apple-system, system-ui, sans-serif; }

    .page-layout { display: flex; flex-direction: column; height: 100vh; }

    .top-bar {
      display: flex; align-items: center; gap: 14px;
      padding: 12px 20px; border-bottom: 1px solid #2a2a2a;
      background: #0d0d0d; flex-shrink: 0;
    }
    .top-bar .logo { font-weight: 700; letter-spacing: 0.5px; font-size: 14px; color: #f0f0f0; text-decoration: none; }
    .top-bar nav { display: flex; gap: 14px; font-size: 12px; flex: 1; }
    .top-bar nav a { color: #888; text-decoration: none; }
    .top-bar nav a:hover { color: #0066FF; }
    .top-bar nav a.active { color: #0066FF; }
    .top-bar .identity { font-size: 11px; color: #666; }
    .top-bar .identity button { background: none; border: none; color: #0066FF; cursor: pointer; font-size: 11px; margin-left: 6px; }

    .tabs {
      display: flex; gap: 0; border-bottom: 1px solid #2a2a2a;
      padding: 0 20px; flex-shrink: 0;
    }
    .tab {
      padding: 10px 18px; font-size: 13px; color: #888;
      cursor: pointer; border-bottom: 2px solid transparent;
      background: none; border-top: none; border-left: none; border-right: none;
    }
    .tab:hover { color: #e0e0e0; }
    .tab.active { color: #0066FF; border-bottom-color: #0066FF; }
    .tab .count { background: #2a2a2a; color: #888; padding: 1px 7px; border-radius: 8px; font-size: 10px; margin-left: 6px; }

    .content { flex: 1; overflow-y: auto; padding: 20px; }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 12px;
    }

    .tile {
      background: #141414; border: 1px solid #2a2a2a; border-radius: 10px;
      padding: 16px; display: flex; flex-direction: column; gap: 10px;
      transition: border-color 0.15s; cursor: pointer;
    }
    .tile:hover { border-color: #0066FF; }
    .tile-head { display: flex; gap: 10px; align-items: center; }
    .tile-icon {
      font-size: 22px; width: 40px; height: 40px; display: flex;
      align-items: center; justify-content: center;
      background: #0d0d0d; border: 1px solid #2a2a2a; border-radius: 8px;
      flex-shrink: 0;
    }
    .tile-name { font-size: 14px; font-weight: 600; color: #f0f0f0; margin: 0; }
    .tile-tagline { font-size: 11px; color: #888; margin: 2px 0 0; }
    .tile-meta { font-size: 11px; color: #555; display: flex; gap: 10px; margin-top: auto; }
    .tile-status { display: flex; align-items: center; gap: 5px; font-size: 11px; margin-bottom: 2px; }
    .status-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
    .status-dot.running { background: #22c55e; box-shadow: 0 0 4px #22c55e; animation: pulse-dot 2s ease-in-out infinite; }
    .status-dot.stopped { background: #444; }
    @keyframes pulse-dot { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    .tile-actions { display: flex; gap: 6px; }
    .tile-actions button {
      padding: 6px 12px; border-radius: 5px; font-size: 11px;
      cursor: pointer; border: none; font-weight: 600;
    }
    .btn-open { background: #0066FF; color: white; }
    .btn-open:hover { background: #0052cc; }
    .btn-remove { background: #1f1f1f; border: 1px solid #2a2a2a !important; color: #888; }
    .btn-remove:hover { border-color: #c62828 !important; color: #c62828; }

    .empty {
      text-align: center; color: #555; padding: 60px 20px;
    }
    .empty h2 { color: #e0e0e0; margin: 0 0 8px; font-size: 18px; }
    .empty p { margin: 0 0 16px; font-size: 14px; }
    .empty a {
      display: inline-block; background: #0066FF; color: white;
      padding: 10px 20px; border-radius: 6px; text-decoration: none;
      font-weight: 600; font-size: 13px;
    }

    /* Pane for opening embedded apps inline */
    .pane-overlay {
      position: fixed; inset: 0; background: #0d0d0d; z-index: 100;
      display: none; flex-direction: column;
    }
    .pane-overlay.open { display: flex; }
    .pane-bar {
      display: flex; align-items: center; gap: 10px;
      padding: 8px 16px; background: #141414;
      border-bottom: 1px solid #2a2a2a; flex-shrink: 0;
    }
    .pane-bar .pane-name { font-weight: 600; flex: 1; font-size: 14px; }
    .pane-bar button, .pane-bar a {
      background: #1f1f1f; border: 1px solid #2a2a2a; color: #ccc;
      padding: 5px 12px; border-radius: 5px; font-size: 11px;
      cursor: pointer; text-decoration: none;
    }
    .pane-bar button:hover, .pane-bar a:hover { border-color: #0066FF; }
    .pane-frame { flex: 1; border: none; width: 100%; }

    /* External install modal */
    .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 100; display: none; align-items: center; justify-content: center; padding: 24px; }
    .modal.open { display: flex; }
    .modal-inner {
      background: #141414; border: 1px solid #2a2a2a; border-radius: 12px;
      max-width: 560px; width: 100%; padding: 24px; max-height: 85vh; overflow: auto;
    }
    .modal-inner h2 { margin: 0 0 8px; font-size: 18px; }
    .modal-inner .m-tagline { color: #888; font-size: 13px; margin: 0 0 18px; }
    .modal-inner pre {
      background: #0d0d0d; border: 1px solid #2a2a2a; border-radius: 6px;
      padding: 14px; font-size: 12px; color: #c3e88d; white-space: pre-wrap;
      cursor: pointer; user-select: all; line-height: 1.5;
    }
    .modal-inner .m-actions { display: flex; gap: 8px; margin-top: 18px; flex-wrap: wrap; }
    .modal-inner .m-actions button, .modal-inner .m-actions a {
      padding: 9px 16px; border-radius: 6px; font-size: 13px; font-weight: 600;
      cursor: pointer; text-decoration: none; border: none;
    }
    .m-primary { background: #0066FF; color: white; }
    .m-secondary { background: #1f1f1f; border: 1px solid #2a2a2a !important; color: #ccc; }
  </style>
</head>
<body>
  <div class="page-layout">
    <div class="top-bar">
      <a href="/" class="logo">⚒ FORGE</a>
      <nav>
        <a href="/">Apps</a>
        <a href="/skills.html">Skills</a>
        <a href="/my-tools.html" class="active">My Forge</a>
        <a href="/publish.html">+ Publish</a>
      </nav>
      <div class="identity" id="identity"></div>
    </div>
    <div class="tabs" id="tabs"></div>
    <div class="content" id="content"></div>
  </div>

  <div class="pane-overlay" id="pane">
    <div class="pane-bar">
      <span class="pane-name" id="pane-name"></span>
      <a id="pane-newtab" href="#" target="_blank" rel="noopener">↗ Full screen</a>
      <button id="pane-close">Close</button>
    </div>
    <iframe class="pane-frame" id="pane-frame" sandbox="allow-scripts allow-forms allow-modals allow-downloads"></iframe>
  </div>

  <div class="modal" id="ext-modal">
    <div class="modal-inner" id="ext-inner"></div>
  </div>

  <script src="/js/utils.js"></script>
  <script src="/js/api.js"></script>
  <script>
  (function () {
    'use strict';

    const STORAGE_USER_ID = 'forge_user_id';
    function getUserId() {
      let id = ''; try { id = localStorage.getItem(STORAGE_USER_ID) || ''; } catch (e) {}
      if (!id) { id = crypto.randomUUID ? crypto.randomUUID() : 'anon-' + Date.now(); try { localStorage.setItem(STORAGE_USER_ID, id); } catch (e) {} }
      return id;
    }
    function authHeaders() { return { 'X-Forge-User-Id': getUserId() }; }
    function esc(s) { return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

    let installed = [], starred = [], skills = [];
    let activeTab = 'installed';
    let runningApps = {}; // slug -> {running, pid, uptime_sec}
    let agentAvailable = false;

    const tabsEl = document.getElementById('tabs');
    const contentEl = document.getElementById('content');
    const identityEl = document.getElementById('identity');

    async function load() {
      const h = authHeaders();
      const [sh, st, sk] = await Promise.all([
        fetch('/api/me/items', { headers: h }).then(r => r.json()).catch(() => ({})),
        fetch('/api/me/stars', { headers: h }).then(r => r.json()).catch(() => ({})),
        fetch('/api/me/skills', { headers: h }).then(r => r.json()).catch(() => ({})),
      ]);
      installed = sh.items || [];
      starred = st.items || [];
      skills = sk.skills || [];
      await loadRunningStatus();
      // Auto-sync: if forge-agent knows about installed apps not on the shelf, add them
      await syncAgentAppsToShelf();
      render();
    }

    async function syncAgentAppsToShelf() {
      if (!agentAvailable) return;
      const shelfSlugs = new Set(installed.map(i => i.slug));
      const missing = Object.keys(runningApps).filter(s => !shelfSlugs.has(s));
      if (!missing.length) return;
      const h = authHeaders();
      let added = false;
      for (const slug of missing) {
        try {
          const tr = await fetch(`/api/tools/slug/${encodeURIComponent(slug)}`);
          if (!tr.ok) continue;
          const tool = await tr.json();
          if (!tool.id) continue;
          await fetch(`/api/me/items/${tool.id}`, {
            method: 'POST',
            headers: { ...h, 'Content-Type': 'application/json' },
            body: JSON.stringify({ installed: true }),
          });
          added = true;
        } catch (e) { /* skip */ }
      }
      if (added) {
        // Re-fetch shelf to include newly synced items
        const sh = await fetch('/api/me/items', { headers: h }).then(r => r.json()).catch(() => ({}));
        installed = sh.items || [];
      }
    }

    async function loadRunningStatus() {
      try {
        const r = await fetch('/api/forge-agent/running', { signal: AbortSignal.timeout(8000) });
        if (r.ok) {
          const data = await r.json();
          agentAvailable = true;
          runningApps = {};
          (data.apps || []).forEach(a => { runningApps[a.slug] = a; });
        }
      } catch (e) {
        agentAvailable = false;
      }
    }

    // Refresh running status every 15s
    setInterval(async () => {
      if (activeTab === 'installed') {
        await loadRunningStatus();
        renderContent();
      }
    }, 15000);

    function render() {
      renderIdentity();
      renderTabs();
      renderContent();
    }

    function renderIdentity() {
      const email = localStorage.getItem('forge_user_email') || '';
      const name = localStorage.getItem('forge_user_name') || '';
      if (email) {
        identityEl.innerHTML = `${esc(name || email)} <button onclick="localStorage.removeItem('forge_user_email');localStorage.removeItem('forge_user_name');location.reload()">sign out</button>`;
      } else {
        identityEl.innerHTML = `anonymous <button onclick="var e=prompt('Your email:');if(e){localStorage.setItem('forge_user_email',e);fetch('/api/me',{method:'POST',headers:{'X-Forge-User-Id':'${getUserId()}','Content-Type':'application/json'},body:JSON.stringify({email:e})}).then(()=>location.reload())}">set email</button>`;
      }
    }

    function renderTabs() {
      const tabs = [
        { key: 'installed', label: 'Installed', count: installed.length + Object.keys(runningApps).filter(s => !installed.some(i => i.slug === s)).length },
        { key: 'saved', label: 'Saved for later', count: starred.length },
        { key: 'skills', label: 'Skills', count: skills.length },
      ];
      tabsEl.innerHTML = tabs.map(t =>
        `<button class="tab ${activeTab === t.key ? 'active' : ''}" data-tab="${t.key}">
          ${t.label}<span class="count">${t.count}</span>
        </button>`
      ).join('');
      tabsEl.querySelectorAll('.tab').forEach(btn => {
        btn.onclick = () => { activeTab = btn.dataset.tab; renderTabs(); renderContent(); };
      });
    }

    function renderContent() {
      if (activeTab === 'installed') renderInstalled();
      else if (activeTab === 'saved') renderSaved();
      else if (activeTab === 'skills') renderSkills();
    }

    function renderInstalled() {
      // Merge forge-agent apps that aren't on the web shelf
      const shelfSlugs = new Set(installed.map(i => i.slug));
      const merged = [...installed];
      for (const [slug, info] of Object.entries(runningApps)) {
        if (!shelfSlugs.has(slug)) {
          merged.push({
            slug,
            name: info.name || slug,
            icon: null,
            tagline: '',
            delivery: 'external',
            open_count: 0,
            _fromAgent: true,
          });
        }
      }
      if (!merged.length) {
        contentEl.innerHTML = '<div class="empty"><h2>Nothing installed yet</h2><p>Browse the catalog and install apps you want to use.</p><a href="/">Browse apps →</a></div>';
        return;
      }
      const grid = document.createElement('div');
      grid.className = 'grid';
      merged.forEach(item => grid.appendChild(makeTile(item, 'installed')));
      contentEl.innerHTML = '';
      contentEl.appendChild(grid);
    }

    function renderSaved() {
      if (!starred.length) {
        contentEl.innerHTML = '<div class="empty"><h2>No saved apps</h2><p>Star ☆ apps in the catalog to save them for later.</p><a href="/">Browse apps →</a></div>';
        return;
      }
      const grid = document.createElement('div');
      grid.className = 'grid';
      starred.forEach(item => grid.appendChild(makeTile(item, 'saved')));
      contentEl.innerHTML = '';
      contentEl.appendChild(grid);
    }

    function renderSkills() {
      if (!skills.length) {
        contentEl.innerHTML = '<div class="empty"><h2>No skills synced</h2><p>Subscribe to skills in the Skills library, then run <code>forge sync</code>.</p><a href="/skills.html">Browse skills →</a></div>';
        return;
      }
      contentEl.innerHTML = '<div class="grid">' + skills.map(s =>
        `<div class="tile" style="cursor:default;">
          <div class="tile-head">
            <div class="tile-icon">📄</div>
            <div>
              <p class="tile-name">${esc(s.title)}</p>
              <p class="tile-tagline">${esc(s.category || 'general')}</p>
            </div>
          </div>
          <div class="tile-meta"><span>by ${esc(s.author_name || 'unknown')}</span></div>
        </div>`
      ).join('') + '</div>';
    }

    function formatUptime(sec) {
      if (!sec || sec < 60) return 'just started';
      if (sec < 3600) return Math.floor(sec / 60) + 'm';
      const h = Math.floor(sec / 3600);
      const m = Math.floor((sec % 3600) / 60);
      return h + 'h ' + m + 'm';
    }

    function makeTile(item, section) {
      const tile = document.createElement('div');
      tile.className = 'tile';
      const isExt = item.delivery === 'external';
      const slug = item.slug || '';
      const rs = runningApps[slug];
      const isRunning = rs && rs.running;

      let statusHTML = '';
      if (isExt) {
        statusHTML = `<div class="tile-status" data-slug="${esc(slug)}">
          <span class="status-dot ${isRunning ? 'running' : 'stopped'}"></span>
          <span style="color:${isRunning ? '#4caf50' : '#555'}">${isRunning ? 'Running' + (rs && rs.uptime_sec ? ' · ' + formatUptime(rs.uptime_sec) : '') : 'Not running'}</span>
        </div>`;
      }

      let openLabel = 'Open';
      let openStyle = 'background:#0066FF;color:white;';
      if (isExt) {
        if (isRunning) {
          openLabel = '● Focus';
          openStyle = 'background:rgba(76,175,80,0.15);color:#4caf50;border:1px solid rgba(76,175,80,0.3);';
        } else {
          openLabel = 'Launch';
          openStyle = 'background:#0066FF;color:white;';
        }
      }

      tile.innerHTML = `
        <div class="tile-head">
          <div class="tile-icon">${esc(item.icon || '⊞')}</div>
          <div>
            <p class="tile-name">${esc(item.name)}</p>
            <p class="tile-tagline">${esc(item.tagline || '')}</p>
          </div>
        </div>
        ${statusHTML}
        <div class="tile-meta">
          <span>${item.open_count || 0} opens</span>
          ${isExt ? '<span>· external</span>' : ''}
        </div>
        <div class="tile-actions">
          <button class="btn-open" style="${openStyle}">${openLabel}</button>
          <button class="btn-remove">${section === 'saved' ? 'Unsave' : 'Remove'}</button>
        </div>`;

      tile.querySelector('.btn-open').onclick = async (e) => {
        e.stopPropagation();
        if (isExt && agentAvailable) {
          const btn = e.target;
          btn.disabled = true;
          btn.textContent = 'Opening...';
          try {
            await fetch('/api/forge-agent/launch', {
              method: 'POST',
              headers: { ...authHeaders(), 'Content-Type': 'application/json' },
              body: JSON.stringify({ app_slug: slug, app_name: item.name }),
              signal: AbortSignal.timeout(5000),
            });
            // Optimistic: flip to Focus immediately
            runningApps[slug] = { slug, name: item.name, running: true, pid: null };
            btn.textContent = '● Focus';
            btn.style.cssText = 'background:rgba(76,175,80,0.15);color:#4caf50;border:1px solid rgba(76,175,80,0.3);padding:6px 12px;border-radius:5px;font-size:11px;cursor:pointer;font-weight:600;';
            // Update status dot
            const statusEl = tile.querySelector('.tile-status');
            if (statusEl) {
              statusEl.innerHTML = '<span class="status-dot running"></span><span style="color:#4caf50">Running</span>';
            }
            // Bump open count
            fetch(`/api/me/items/${item.id}/launch`, {
              method: 'POST', headers: { ...authHeaders(), 'Content-Type': 'application/json' }, body: '{}',
            }).catch(() => {});
          } catch (err) {
            btn.textContent = openLabel;
          }
          btn.disabled = false;
          return;
        }
        if (isExt) openExternal(item);
        else openEmbedded(item);
      };

      tile.querySelector('.btn-remove').onclick = async (e) => {
        e.stopPropagation();
        if (section === 'saved') {
          await fetch(`/api/me/stars/${item.id}`, { method: 'DELETE', headers: authHeaders() });
        } else {
          await fetch(`/api/me/items/${item.id}`, { method: 'DELETE', headers: authHeaders() });
          // Also unregister from forge-agent if external
          if (isExt && agentAvailable && slug) {
            fetch('/api/forge-agent/uninstall', {
              method: 'POST',
              headers: { ...authHeaders(), 'Content-Type': 'application/json' },
              body: JSON.stringify({ slug }),
              signal: AbortSignal.timeout(3000),
            }).catch(() => {});
          }
        }
        await load();
      };

      tile.onclick = () => {
        if (isExt) openExternal(item);
        else openEmbedded(item);
      };

      return tile;
    }

    // Embedded pane
    const pane = document.getElementById('pane');
    const paneName = document.getElementById('pane-name');
    const paneFrame = document.getElementById('pane-frame');
    const paneNewtab = document.getElementById('pane-newtab');
    document.getElementById('pane-close').onclick = () => {
      pane.classList.remove('open');
      paneFrame.src = 'about:blank';
    };
    document.addEventListener('keydown', e => { if (e.key === 'Escape') { pane.classList.remove('open'); paneFrame.src = 'about:blank'; extModal.classList.remove('open'); } });

    function openEmbedded(item) {
      const src = `/apps/${encodeURIComponent(item.slug)}?user=${encodeURIComponent(getUserId())}`;
      paneName.textContent = `${item.icon || '⊞'} ${item.name}`;
      paneFrame.src = src;
      paneNewtab.href = src;
      pane.classList.add('open');
      // Bump open count
      fetch(`/api/me/items/${item.id}/launch`, {
        method: 'POST', headers: { ...authHeaders(), 'Content-Type': 'application/json' }, body: '{}',
      }).catch(() => {});
    }

    // External modal
    const extModal = document.getElementById('ext-modal');
    const extInner = document.getElementById('ext-inner');
    extModal.onclick = e => { if (e.target === extModal) extModal.classList.remove('open'); };

    function openExternal(item) {
      extInner.innerHTML = `
        <h2>${esc(item.icon || '⊞')} ${esc(item.name)}</h2>
        <p class="m-tagline">${esc(item.tagline || '')}</p>
        ${item.install_command ? `
          <div style="font-size:11px;color:#888;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:6px;">Install command</div>
          <pre onclick="navigator.clipboard.writeText(this.innerText)" title="Click to copy">${esc(item.install_command)}</pre>
        ` : ''}
        <div class="m-actions">
          ${item.source_url ? `<a class="m-primary" href="${esc(item.source_url)}" target="_blank" rel="noopener">View on GitHub →</a>` : ''}
          <button class="m-secondary" onclick="document.getElementById('ext-modal').classList.remove('open')">Close</button>
        </div>`;
      extModal.classList.add('open');
    }

    load();
  })();
  </script>
</body>
</html>
