<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forge — Share your Claude Code apps &amp; skills</title>
  <meta name="description" content="A place to share the apps and skills you built with Claude Code with your team.">
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
  <main class="page" id="page" role="main">
    <section id="hero-container"></section>

    <nav class="section" aria-label="Platform links"
         style="display:flex; gap:14px; justify-content:flex-end; align-items:center;">
      <a href="/index.html" class="muted" id="nav-apps-link">⊞ Apps</a>
      <a href="/skills.html" class="muted">✨ Skills</a>
      <a href="/my-tools.html" class="muted">My submissions</a>
    </nav>

    <section class="section" style="display:flex; gap:10px; align-items:center;">
      <label class="sr-only" for="catalog-search">Search apps</label>
      <div class="search" style="flex:1;">
        <span class="search-icon" aria-hidden="true">🔍</span>
        <input type="search" id="catalog-search" data-search
               placeholder="Search apps by name, category, or what they do…" autocomplete="off">
        <span class="search-kbd" aria-hidden="true">⌘K</span>
      </div>
    </section>

    <section class="filter-bar" aria-label="Filters">
      <div class="pill-group" id="category-pills" role="tablist" aria-label="Category"></div>
      <div style="margin-left:auto;">
        <label class="sr-only" for="sort-select">Sort</label>
        <select id="sort-select" style="width:auto; min-width:160px;">
          <option value="most_used">Most Used</option>
          <option value="newest">Newest</option>
          <option value="highest_rated">Highest Rated</option>
          <option value="alphabetical">A-Z</option>
        </select>
      </div>
    </section>

    <section id="results-container" aria-live="polite">
      <div class="grid grid-3" id="results-grid"></div>
      <div id="load-sentinel" style="height: 40px;"></div>
    </section>
  </main>

  <script src="/js/utils.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/catalog.js"></script>
</body>
</html>
