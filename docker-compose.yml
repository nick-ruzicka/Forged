version: "3.9"

services:
  forge-app:
    build: .
    image: forge:dev
    container_name: forge-app
    ports:
      - "8090:8090"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://forge:forge@postgres:5432/forge
      REDIS_URL: redis://redis:6379/0
    volumes:
      - ./logs:/app/logs
      - ./static:/app/static
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped

  postgres:
    image: postgres:15
    container_name: forge-postgres
    environment:
      POSTGRES_USER: forge
      POSTGRES_PASSWORD: forge
      POSTGRES_DB: forge
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U forge -d forge"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: forge-redis
    ports:
      - "6379:6379"
    restart: unless-stopped

  celery-worker:
    build: .
    image: forge:dev
    container_name: forge-celery-worker
    command: ["celery", "-A", "celery_app", "worker", "--loglevel=info", "--concurrency=4", "-n", "forge-worker@%h"]
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://forge:forge@postgres:5432/forge
      REDIS_URL: redis://redis:6379/0
    volumes:
      - ./logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped

  celery-beat:
    build: .
    image: forge:dev
    container_name: forge-celery-beat
    command: ["celery", "-A", "celery_app", "beat", "--loglevel=info", "--schedule=/app/logs/celerybeat-schedule", "--pidfile=/app/logs/celerybeat.pid"]
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://forge:forge@postgres:5432/forge
      REDIS_URL: redis://redis:6379/0
    volumes:
      - ./logs:/app/logs
    depends_on:
      redis:
        condition: service_started
    restart: unless-stopped

volumes:
  postgres_data:
