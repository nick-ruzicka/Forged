server {
    listen 80 default_server;
    server_name _;

    client_max_body_size 2m;

    access_log /var/log/nginx/forge.access.log;
    error_log  /var/log/nginx/forge.error.log;

    # Frontend SPA
    location / {
        root /root/forge/frontend;
        try_files $uri $uri/ /index.html;
    }

    # Backend API
    location /api/ {
        proxy_pass http://127.0.0.1:8090;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # Static assets (generated instructions, etc.)
    location /static/ {
        alias /root/forge/static/;
        autoindex off;
        expires 1h;
        add_header Cache-Control "public";
    }

    # Shareable token links — handled by Flask to redirect/resolve
    location /t/ {
        proxy_pass http://127.0.0.1:8090;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
